name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype6-dev \
            libcurl4-openssl-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev

      - name: Build Projucer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          msbuild JUCE\extras\Projucer\Builds\VisualStudio2022\Projucer.sln /p:Configuration=Release /p:Platform=x64

      - name: Build Projucer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          xcodebuild -project JUCE/extras/Projucer/Builds/MacOSX/Projucer.xcodeproj -configuration Release -alltargets

      - name: Build Projucer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          make -C JUCE/extras/Projucer/Builds/LinuxMakefile

      - name: Resave project (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          JUCE\extras\Projucer\Builds\VisualStudio2022\x64\Release\App\Projucer.exe --resave ProKeysPreview.jucer

      - name: Resave project (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ./JUCE/extras/Projucer/Builds/MacOSX/build/Release/Projucer.app/Contents/MacOS/Projucer --resave ProKeysPreview.jucer

      - name: Resave project (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./JUCE/extras/Projucer/Builds/LinuxMakefile/build/Projucer --resave ProKeysPreview.jucer

      - name: Build plugin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          msbuild Builds\VisualStudio2026\ProKeysPreview.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143

      - name: Package VST3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path Builds\VisualStudio2026\x64\Release\VST3\ProKeysPreview.vst3 -DestinationPath dist\ProKeysPreview-Windows-VST3.zip

      - name: Build plugin (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          xcodebuild -project Builds/MacOSX/ProKeysPreview.xcodeproj -configuration Release -alltargets

      - name: Package VST3 (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent Builds/MacOSX/build/Release/ProKeysPreview.vst3 dist/ProKeysPreview-macOS-VST3.zip

      - name: Build plugin (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          make -C Builds/LinuxMakefile CONFIG=Release

      - name: Package VST3 (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          zip -r dist/ProKeysPreview-Linux-VST3.zip Builds/LinuxMakefile/build/ProKeysPreview.vst3

      - name: Upload VST3 artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ProKeysPreview-Windows-VST3
          path: dist/ProKeysPreview-Windows-VST3.zip
          if-no-files-found: warn

      - name: Upload VST3 artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ProKeysPreview-macOS-VST3
          path: dist/ProKeysPreview-macOS-VST3.zip
          if-no-files-found: warn

      - name: Upload VST3 artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ProKeysPreview-Linux-VST3
          path: dist/ProKeysPreview-Linux-VST3.zip
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ProKeysPreview-Windows-VST3/**
            ProKeysPreview-macOS-VST3/**
            ProKeysPreview-Linux-VST3/**
